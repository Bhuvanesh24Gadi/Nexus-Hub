{% extends "base.html" %}

{% block title %}Logged Out | Social Space{% endblock %}

{% block content %}
<div class="centered-auth-wrapper">
    <div class="auth-container glass-panel logout-box">
        
        <div class="status-icon-glow">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="neon-svg-red" viewBox="0 0 16 16">
              <path d="M11 1a2 2 0 0 0-2 2v4a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h5V3a3 3 0 0 1 6 0v4a.5.5 0 0 1-1 0V3a2 2 0 0 0-2-2z"/>
            </svg>
        </div>

        <h1 class="auth-header neon-text-red">LOGGED OUT</h1>
        
        <div class="auth-subtext">
            <p class="status-message">Your session has been securely terminated.</p>
            <p>Security is our priority. Thank you for visiting.</p>
        </div>

        <div class="form-actions">
            <a href="{% url 'login' %}" class="btn-primary-neon full-width">LOG-IN AGAIN</a>
        </div>
    </div>
</div>
{% endblock %}
